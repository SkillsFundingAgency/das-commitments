openapi: 3.0.0
info:
  version: "1.0"
  title: Start an approval endpoint
  description: Approval endpoint to allow consumers to start an approval by sending changes on approved learning. Approvals will calculate whether approval is required and start the process
paths:
  /info:
    get:
      description: information regarding this API. The version will be returned
      responses:
        "200":
          $ref: "#/components/responses/infoResponse"
  
  /health:
    get:
      description: The system is fully ready to accept requests and all the dependencies are healthy
      responses:
        "200":
          $ref: "#/components/responses/healthCheckResponse"
        "503":
          $ref: "#/components/responses/healthCheckResponse"
  
  /approvals/{learningKey}:
    put:
      summary: Request to update a pending approval for the record on learning. This allows metrics on whether we are synchronised between systems
      parameters:
      - in: path
        name: learningKey
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        $ref: "#/components/requestBodies/approvalRequest"
      responses:
        "201":
          $ref: "#/components/responses/approvalResponse"
        "404":
          $ref: "#/components/responses/notFound"
        "400":
          $ref: "#/components/responses/errorNoPendingChangeResponse"
    post:
      summary: Request to start a new approval for the record on learning. This allows metrics on whether we are synchronised between systems
      parameters:
      - in: path
        name: learningKey
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        $ref: "#/components/requestBodies/approvalRequest"
      responses:
        "201":
          $ref: "#/components/responses/approvalResponse"          
        "404":
          $ref: "#/components/responses/notFound"
        "400":
          $ref: "#/components/responses/errorPendingChangeExistsResponse"
    delete:
      summary: Request to delete the current pending approval on this record
      parameters:
      - in: path
        name: learningKey
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: An approval was deleted
        "400":
          description: An approval was not found in pending state for this learningkey

  /approvals/{learningKey}/status:
    patch:
      summary: Update the status of an existing approval request
      parameters:
      - in: path
        name: learningKey
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        $ref: "#/components/requestBodies/approvalStatusRequest"
      responses:
        "200":
          $ref: '#/components/responses/okResponse'
        "404":
          $ref: "#/components/responses/notFound"
        "400":
          $ref: "#/components/responses/errorResponse"

  /approvals/pending:
    get:
      summary: Returns all pending approval requests grouped by employer with a count of pending changes
      parameters:
      - in: query
        name: ukprn
        required: false
        schema:
          type: string
        description: Optionally filter pending approvals by provider
      - in: query
        name: page
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
        description: The page number to retrieve
      - in: query
        name: pageSize
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
        description: The number of records per page
      responses:
        "200":
          $ref: "#/components/responses/pendingApprovalsSummaryResponse"

components:
  requestBodies:
    approvalRequest:
      description: Details changes to training records to be evaluated
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/approvalRequest"

    approvalStatusRequest:
      description: The status to apply to an approval request
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/approvalStatusRequest"

  responses:
    approvalResponse:
      description: A response to an approval request containing each field and the status of approval
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/approvalsResult"

    pendingApprovalsSummaryResponse:
      description: A paged list of pending approval counts grouped by employer
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/pagedPendingApprovalSummary"

    okResponse:
      description: OK
      content:
        text/plain:
          schema:
            type: string
            example: OK

    errorResponse:
      description: A general error response
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "#/components/schemas/error"

    errorNoPendingChangeResponse:
      description: There is no pending change to override
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "#/components/schemas/error"

    errorPendingChangeExistsResponse:
      description: There is a pending change and the caller has asked to create a new one
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "#/components/schemas/error"

    notFound:
      description: Not found response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/error"

    healthCheckResponse:
      description: Results of a health check
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/healthcheckResults"

    infoResponse:
      description: Information response
      content:
        text/plain:
          schema:
            type: string
            example: Leaner data APIM for the training service - Version 3.0.2

  schemas:
    error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
      required:
        - code
        - message

    change:
      type: object
      required:
        - old
        - new
      properties:
        old:
          description: The old value of the field being changed
          type: string
        new:
          description: The new value to be applied
          type: string
        effectiveFromDate:
          description: The date this change will take effect
          type: string
          format: date

    approvalsResult:
      type: array
      items:
        type: object
        properties:
          changeType:
            description: The field being changed. An enumerated type to be agreed across the service for each field
            type: string
            enum: [TNP1, TNP2]
          approvalStatus:
            description: The status of an approval request on an individual piece of data
            type: string
            enum:
              - autoApproved
              - autoRejected
              - employerApprovalRequired
          reason:
            type: string
            description: A reason for the approval result
        required:
          - changeType
          - approvalStatus

    approvalRequest:
      type: object
      properties:
        ukprn:
          type: string
        apprenticeshipId:
          type: string
        uln:
          type: string
        learningKey:
          type: string
          format: uuid
        learningType:
          type: string
          enum:
            - apprenticeship
            - foundation
            - shortCourse
        approvedUri:
          description: This is the uri to fetch the current record that has been approved
          type: string
          format: uri
        changes:
          $ref: "#/components/schemas/learningChangeArray"

    approvalStatusRequest:
      type: object
      required:
        - status
      properties:
        status:
          description: The status to set on the approval request
          type: string
          enum:
            - approved
            - rejected
            - pending
        reason:
          description: Optional reason for the status change, required when rejecting
          type: string

    learningChangeArray:
      type: array
      description: >
        A list of key/value pairs, where the key is a change enum and the value is a data object.
      items:
        $ref: "#/components/schemas/learningChange"

    learningChange:
      type: object
      required: [changeType, data]
      properties:
        changeType:
          type: string
          enum: [TNP1, TNP2]
        data:
          $ref: "#/components/schemas/change"

    pendingApprovalEmployerSummary:
      type: object
      properties:
        accountId:
          description: The employer account ID
          type: integer
        employerName:
          description: The employer name
          type: string
        pendingCount:
          description: The total number of pending approval changes for this employer
          type: integer
          example: 12
      required:
        - accountId
        - pendingCount

    pagedPendingApprovalSummary:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/pendingApprovalEmployerSummary"
        totalItems:
          description: Total number of employers with pending approvals
          type: integer
          example: 34
        page:
          description: The current page number
          type: integer
          example: 1
        pageSize:
          description: The number of records per page
          type: integer
          example: 20
        totalPages:
          description: Total number of pages available
          type: integer
          example: 2
      required:
        - items
        - totalItems
        - page
        - pageSize
        - totalPages

    healthcheckResults:
      type: array
      items:
        $ref: "#/components/schemas/healthcheck"

    healthcheck:
      type: object
      properties:
        description:
          type: string
        result:
          type: string