openapi: 3.0.0
info:
  version: "1.0"
  title: Audit history
  description: Approval endpoint to allow consumers to start an approval by sending changes on approved learning. Approvals will calculate whether approval is required and start the process
paths:
  /info:
    get:
      description: information regarding this API. The version will be returned
      responses:
        "200":
          $ref: "#/components/responses/infoResponse"
  
  /health:
    get:
      description: The system is fully ready to accept requests and all the dependencies are healthy
      responses:
        "200":
          $ref: "#/components/responses/healthCheckResponse"
        "503":
          $ref: "#/components/responses/healthCheckResponse"

  /learners/employers/{accountId}:
    get:
      summary: returns the audit history for a particular employer. The caller needs to have permission to view these learner
      parameters:
      - in: path
        name: accountId
        required: true
        schema:
          type: integer
      - in: query
        name: page
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
        description: The page number to retrieve
      - in: query
        name: pageSize
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
        description: The number of records per page
      responses:
        "200":
          $ref: "#/components/responses/pagedHistoryResponse"

  /learners/employers/{accountId}/providers/{ukprn}/learners/{apprenticeshipId}:
    get:
      summary: returns the audit history for a particular learner. The caller needs to have permission to view this learner
      parameters:
      - in: path
        name: accountId
        required: true
        schema:
          type: integer
      - in: path
        name: apprenticeshipId
        required: true
        schema:
          type: integer
      - in: path
        name: ukprn
        required: true
        schema:
          type: integer
      responses:
        "200":
          $ref: "#/components/responses/historyArray"  

  /learners/providers/{ukprn}/count:
    get:
      description: return a count of events that have happened between a datetime
      parameters:
      - in: path
        name: ukprn
        required: true
        schema:
          type: integer
      - in: query
        name: dateFrom
        required: true
        schema:
          type: string
          format: datetime
        description: The date to query the activity from
      - in: query
        name: dateTo
        required: true
        schema:
          type: string
          format: datetime
        description: The date to query the activity to
      responses:
        "200":
          $ref: "#/components/responses/notificationCount"

  /learners/employers/{accountId}/count:
    get:
      description: return a count of events that have happened between a datetime
      parameters:
      - in: path
        name: accountId
        required: true
        schema:
          type: integer
      - in: query
        name: dateFrom
        required: true
        schema:
          type: string
          format: datetime
        description: The date to query the activity from
      - in: query
        name: dateTo
        required: true
        schema:
          type: string
          format: datetime
        description: The date to query the activity to
      responses:
        "200":
          $ref: "#/components/responses/notificationCount"
  
components:  
  responses:
    okResponse:
      description: OK
      content:
        text/plain:
          schema:
            type: string
            example: OK

    historyArray:
      description: An array of history for learners
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "#/components/schemas/history"

    notificationCount:
      description: The count of data thats changed
      content:
        application/json: 
          schema:
            type: object
            properties: 
              changesCount:
                description: the count
                type: integer
    
    pagedHistoryResponse:
      description: A paged array of history for learners
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/pagedHistory"
    
    notFound:
      description: Not found response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/error"

    healthCheckResponse:
      description: Results of a health check
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/healthcheckResults"

    infoResponse:
      description: Information response
      content:
        text/plain:
          schema:
            type: string
            example: Leaner data APIM for the training service - Version 3.0.2
            
  schemas:
    error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
      required:
        - code
        - message

    pagedHistory:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/history"
        totalItems:
          description: Total number of records across all pages
          type: integer
          example: 243
        page:
          description: The current page number
          type: integer
          example: 1
        pageSize:
          description: The number of records per page
          type: integer
          example: 20
        totalPages:
          description: Total number of pages available
          type: integer
          example: 13
      required:
        - items
        - totalItems
        - page
        - pageSize
        - totalPages
    
    history:
      type: object
      properties:
        source:
          description: Where was this change applied
          type: string
          enum:
            - TBD
        changeType:
          description: The ytype of change applied
          type: string
          enum:
            - TBD
        description:
          description: The change description
          type: string
        userId:
          description: The user Id of the change. Used primarily for support as this wont be displayed to the userId
          type: integer
        apprenticeshipId:
          description: The id within approvals of the learner record
          ty[e: integer
        learnerName:
          description: The learner name this applies to
          type: string
        learningKey: 
          description: The learningKey used from learning 
          type: string
          format: uniqueidentifier
        created:
          description: The date the entry was Created
          type: string
          format: datetime
        appliedDate:
          description: The date the change applies
          type: string
          format: datetime
        accountId:
          description: The accountId of the employer this learner belongs
          type: integer
        UKPRN: 
          description: The provider ukprn
          type: integer
        providerName: 
          description: The provider name to aid display to the user
          type: string
        employerName: 
          description: The employer name to aid display to the user
          type: string
    healthcheckResults:
      type: array
      items:
        $ref: "#/components/schemas/healthcheck" 
  
    healthcheck:
      type: object
      properties:
        description: 
          type: string
        result: 
          type: string